run:
  timeout: 5m
  tests: true

linters:
  enable:
    - goimports
    - gofmt
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - typecheck
    - misspell
    - gosec

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - (io.Writer).Write
  gosec:
    excludes:
      - G101  # hardcoded credentials (false positives in tests)
      - G304  # file path from variable — all paths come from CLI flags/fixtures, not HTTP input
      - G301  # dir permissions 0755 is conventional for CLI-generated output dirs
      - G306  # file permissions 0644 is conventional for generated .tf/.yaml files

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - linters: [errcheck]
      text: "Error return value of `.*\\.Close`"

output:
  formats:
    - format: colored-line-number
