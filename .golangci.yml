run:
  timeout: 5m
  tests: true

linters:
  enable:
    - goimports
    - gofmt
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - typecheck
    - misspell
    - gosec

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - (io.Writer).Write
  gosec:
    excludes:
      - G101  # hardcoded credentials (false positives in tests)

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - linters: [errcheck]
      text: "Error return value of `.*\\.Close`"

output:
  formats:
    - format: colored-line-number
