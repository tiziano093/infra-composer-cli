version: 2

project_name: infra-composer

before:
  hooks:
    - go mod tidy

builds:
  - id: infra-composer
    main: ./cmd/infra-composer
    binary: infra-composer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

brews:
  - name: infra-composer
    repository:
      owner: tiziano093
      name: homebrew-infra-composer
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser
      email: goreleaser@infra-composer.dev
    homepage: https://github.com/tiziano093/infra-composer-cli
    description: Portable CLI for composing Terraform stacks from provider catalogs.
    license: Apache-2.0
    test: |
      system "#{bin}/infra-composer", "--version"
    install: |
      bin.install "infra-composer"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
